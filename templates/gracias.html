<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>¡Gracias!</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #2A4038;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px 16px;
        }
        .card {
            background: #fff;
            border-radius: 16px;
            padding: 40px 48px 44px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 4px 28px rgba(0,0,0,.10);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        .logo-img {
            width: 265px;
            height: auto;
            display: block;
            margin-bottom: 28px;
        }
        hr {
            border: none;
            border-top: 1px solid #e5e7eb;
            width: 100%;
            margin-bottom: 28px;
        }
        .icon {
            width: 56px;
            height: 56px;
            background: #dcfce7;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 18px;
        }
        .icon svg {
            width: 28px;
            height: 28px;
            stroke: #16a34a;
            stroke-width: 2.5;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        h1 {
            font-size: 24px;
            font-weight: 800;
            color: #111827;
            margin-bottom: 10px;
        }
        p {
            font-size: 14px;
            color: #6b7280;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="card">
        <img src="/static/logo.png" alt="TCI" class="logo-img">
        <hr>
        <div class="icon">
            <svg viewBox="0 0 24 24">
                <polyline points="20 6 9 17 4 12"/>
            </svg>
        </div>
        <h1>¡Registro exitoso!</h1>
        <p>Tu información ha sido enviada correctamente.<br>Que tengas una excelente jornada de trabajo.</p>
    </div>
</body>
</html>
