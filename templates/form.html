<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Teletrabajo</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #2A4038;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px 16px;
        }
        .card {
            background: #fff;
            border-radius: 16px;
            padding: 40px 48px 36px;
            width: 100%;
            max-width: 820px;
            box-shadow: 0 4px 28px rgba(0,0,0,.10);
        }
        .logo {
            margin-bottom: 28px;
        }
        .logo-img {
            height: auto;
            width: 180px;
            display: block;
        }
        h1 {
            font-size: 30px;
            font-weight: 800;
            color: #111827;
            margin-bottom: 10px;
        }
        .subtitle {
            font-size: 13px;
            color: #6b7280;
            line-height: 1.55;
            margin-bottom: 28px;
            font-style: italic;
        }
        hr { border: none; border-top: 1px solid #e5e7eb; margin-bottom: 28px; }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 22px 36px;
        }
        .field label {
            display: block;
            font-size: 14px;
            font-weight: 700;
            color: #111827;
            margin-bottom: 4px;
        }
        .field .hint {
            font-size: 12px;
            color: #6b7280;
            line-height: 1.45;
            margin-bottom: 8px;
            font-style: italic;
        }
        .field input {
            width: 100%;
            padding: 10px 12px;
            font-size: 14px;
            border: 1.5px solid #d1d5db;
            border-radius: 7px;
            color: #111827;
            background: #fff;
            transition: border-color .15s, box-shadow .15s;
        }
        .field input:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37,99,235,.12);
        }
        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 32px;
        }
        .btn-clear {
            background: none;
            border: none;
            color: #2563eb;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 0;
            font-family: inherit;
        }
        .btn-clear:hover { text-decoration: underline; }
        .btn-submit {
            background: #111827;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 11px 32px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: background .15s;
        }
        .btn-submit:hover { background: #1f2937; }
        @media (max-width: 580px) {
            .card { padding: 28px 20px 24px; }
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <img src="/static/logo.png" alt="TCI" class="logo-img">
        </div>

        <h1>Novedades laborales</h1>
        <p class="subtitle">Complete el formulario para reportar su novedad.</p>

        <hr>

        <form action="/submit" method="post">
            <div class="grid">
                <div class="field">
                    <label for="nombre">Nombres</label>
                    <p class="hint">Ingrese su nombre o nombres.</p>
                    <input id="nombre" name="nombre" type="text" required>
                </div>
                <div class="field">
                    <label for="apellidos">Apellidos</label>
                    <p class="hint">Ingrese sus apellidos completos.</p>
                    <input id="apellidos" name="apellidos" type="text" required>
                </div>
                <div class="field">
                    <label for="correo">Correo corporativo</label>
                    <p class="hint">Ingrese su correo corporativo.</p>
                    <input id="correo" name="correo" type="email" required>
                </div>
                <div class="field">
                    <label for="tipo_novedad">Tipo de novedad</label>
                    <p class="hint">Especifique el tipo de novedad que desea reportar.</p>
                    <input id="tipo_novedad" name="tipo_novedad" type="text" required>
                </div>
            </div>

            <div class="footer">
                <button type="reset" class="btn-clear">&#8635; Borrar formulario</button>
                <button type="submit" class="btn-submit" id="btn-submit">Enviar</button>
            </div>
        </form>
    </div>
    <script>
        document.querySelector('form').addEventListener('submit', function() {
            var btn = document.getElementById('btn-submit');
            btn.disabled = true;
            btn.textContent = 'Enviando…';
        });

        document.querySelectorAll('input[type="text"]').forEach(function(input) {
            input.addEventListener('input', function() {
                this.value = this.value.replace(/[0-9]/g, '');
            });
        });
    </script>
</body>
</html>
