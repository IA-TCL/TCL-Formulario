<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Novedad</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px 16px;
            background-color: #1b3129;
            background-image:
                radial-gradient(circle, rgba(255,255,255,.055) 1px, transparent 1px),
                radial-gradient(ellipse at 15% 40%, rgba(61,107,89,.45) 0%, transparent 55%),
                radial-gradient(ellipse at 85% 15%, rgba(42,64,56,.60) 0%, transparent 50%),
                radial-gradient(ellipse at 55% 85%, rgba(26,53,48,.50) 0%, transparent 50%);
            background-size: 28px 28px, 100% 100%, 100% 100%, 100% 100%;
        }

        /* ── Card ─────────────────────────────────────────── */
        .card {
            background: linear-gradient(160deg, #ffffff 0%, #f8faf9 100%);
            border-radius: 20px;
            padding: 40px 48px 36px;
            width: 100%;
            max-width: 820px;
            box-shadow: 0 24px 64px rgba(0,0,0,.28), 0 4px 16px rgba(0,0,0,.12);
            border-top: 4px solid #2A4038;
            animation: slideUp .55s cubic-bezier(.16,1,.3,1) both;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(32px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── Logo ─────────────────────────────────────────── */
        .logo { margin-bottom: 24px; }
        .logo-img { height: auto; width: 180px; display: block; }

        /* ── Header accent ────────────────────────────────── */
        .header {
            border-left: 3px solid #2A4038;
            padding-left: 14px;
            margin-bottom: 24px;
        }

        h1 {
            font-size: 28px;
            font-weight: 800;
            color: #111827;
            margin-bottom: 5px;
            letter-spacing: -0.4px;
        }

        .subtitle {
            font-size: 13px;
            color: #6b7280;
            line-height: 1.6;
            font-style: italic;
        }

        /* ── Divider ──────────────────────────────────────── */
        .divider {
            border: none;
            height: 1px;
            background: linear-gradient(to right, #2A4038 0%, #d1d5db 30%, transparent 100%);
            margin-bottom: 28px;
        }

        /* ── Grid ─────────────────────────────────────────── */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px 36px;
        }

        /* ── Field — staggered entrance ───────────────────── */
        .field {
            opacity: 0;
            animation: fieldIn .45s cubic-bezier(.16,1,.3,1) both;
        }
        .field:nth-child(1) { animation-delay: .25s; }
        .field:nth-child(2) { animation-delay: .35s; }
        .field:nth-child(3) { animation-delay: .45s; }
        .field:nth-child(4) { animation-delay: .55s; }

        @keyframes fieldIn {
            from { opacity: 0; transform: translateY(14px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .field label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            font-weight: 600;
            color: #374151;
            margin-bottom: 4px;
            letter-spacing: .1px;
        }

        .field label svg { color: #2A4038; flex-shrink: 0; }

        .field .hint {
            font-size: 11.5px;
            color: #9ca3af;
            line-height: 1.5;
            margin-bottom: 8px;
            font-style: italic;
        }

        /* ── Input wrapper + icon ─────────────────────────── */
        .input-wrap { position: relative; }

        .input-wrap .icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #c4c9d4;
            pointer-events: none;
            transition: color .2s;
        }

        .input-wrap:focus-within .icon { color: #2A4038; }

        .field input {
            width: 100%;
            padding: 10px 12px 10px 38px;
            font-size: 14px;
            font-family: inherit;
            border: 1.5px solid #e5e7eb;
            border-radius: 10px;
            color: #111827;
            background: #f9fafb;
            transition: border-color .2s, box-shadow .2s, background .2s;
        }

        .field input::placeholder { color: #c4c9d4; font-style: italic; }

        .field input:hover {
            border-color: #c8ced8;
            background: #fff;
        }

        .field input:focus {
            outline: none;
            border-color: #2A4038;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(42,64,56,.1);
        }

        /* ── Footer ───────────────────────────────────────── */
        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 32px;
            padding-top: 22px;
            border-top: 1px solid #f3f4f6;
        }

        .btn-clear {
            background: none;
            border: none;
            color: #1b3129;
            font-size: 13px;
            font-family: inherit;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 12px;
            border-radius: 8px;
            transition: background .15s, color .15s;
        }

        .btn-clear:hover { background: #f3f4f6; color: #3d4350; }

        /* ── Submit — shimmer ─────────────────────────────── */
        .btn-submit {
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, #2A4038 0%, #3d6b59 100%);
            color: #fff;
            border: none;
            border-radius: 10px;
            padding: 11px 36px;
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            letter-spacing: .3px;
            cursor: pointer;
            transition: transform .2s, box-shadow .2s;
            box-shadow: 0 2px 10px rgba(42,64,56,.35);
        }

        .btn-submit::after {
            content: '';
            position: absolute;
            top: 0;
            left: -80%;
            width: 55%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,.22), transparent);
            transform: skewX(-20deg);
            transition: left .55s ease;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(42,64,56,.4);
        }

        .btn-submit:hover::after { left: 150%; }

        .btn-submit:active {
            transform: translateY(0);
            box-shadow: 0 2px 10px rgba(42,64,56,.35);
        }

        .btn-submit:disabled {
            opacity: .65;
            cursor: not-allowed;
            transform: none;
        }

        /* ── Responsive ───────────────────────────────────── */
        @media (max-width: 580px) {
            .card { padding: 28px 20px 24px; }
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <img src="/static/logo.png" alt="TCI" class="logo-img">
        </div>

        <div class="header">
            <h1>Reporte de novedad</h1>
            <p class="subtitle">Complete el formulario para reportar su novedad.</p>
        </div>

        <div class="divider"></div>

        <form action="/submit" method="post">
            <div class="grid">

                <div class="field">
                    <label for="nombre">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                        Nombres
                    </label>
                    <p class="hint">Ingrese su nombre o nombres.</p>
                    <div class="input-wrap">
                        <input id="nombre" name="nombre" type="text" placeholder="Ej. María Fernanda" required>
                        <span class="icon">
                            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                        </span>
                    </div>
                </div>

                <div class="field">
                    <label for="apellidos">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                        Apellidos
                    </label>
                    <p class="hint">Ingrese sus apellidos completos.</p>
                    <div class="input-wrap">
                        <input id="apellidos" name="apellidos" type="text" placeholder="Ej. González Torres" required>
                        <span class="icon">
                            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                        </span>
                    </div>
                </div>

                <div class="field">
                    <label for="correo">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
                        Correo corporativo
                    </label>
                    <p class="hint">Ingrese su correo corporativo.</p>
                    <div class="input-wrap">
                        <input id="correo" name="correo" type="email" placeholder="usuario@tclasesores.com" required>
                        <span class="icon">
                            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
                        </span>
                    </div>
                </div>

                <div class="field">
                    <label for="tipo_novedad">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" x2="8" y1="13" y2="13"/><line x1="16" x2="8" y1="17" y2="17"/></svg>
                        Tipo de novedad
                    </label>
                    <p class="hint">Especifique el tipo de novedad a reportar.</p>
                    <div class="input-wrap">
                        <input id="tipo_novedad" name="tipo_novedad" type="text" placeholder="Escriba su novedad..." required>
                        <span class="icon">
                            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" x2="8" y1="13" y2="13"/><line x1="16" x2="8" y1="17" y2="17"/></svg>
                        </span>
                    </div>
                </div>

            </div>

            <div class="footer">
                <button type="reset" class="btn-clear">&#8635; Borrar información</button>
                <button type="submit" class="btn-submit" id="btn-submit">Enviar &rarr;</button>
            </div>
        </form>
    </div>

    <script>
        document.querySelector('form').addEventListener('submit', function() {
            var btn = document.getElementById('btn-submit');
            btn.disabled = true;
            btn.textContent = 'Enviando…';
        });

        document.querySelectorAll('input[type="text"]').forEach(function(input) {
            input.addEventListener('input', function() {
                this.value = this.value.replace(/[0-9]/g, '');
            });
        });
    </script>
</body>
</html>
